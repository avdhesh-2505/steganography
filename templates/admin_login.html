<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Terminal | StegoShield</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff1f1f;
            --bg-dark: #050505;
            --border: rgba(255, 31, 31, 0.3);
            --glow: 0 0 20px rgba(255, 31, 31, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
        }

        .login-card {
            background: rgba(10, 10, 10, 0.9);
            padding: 50px;
            border-radius: 5px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--glow);
            position: relative;
        }

        .login-card::before {
            content: "ADMIN ACCESS ONLY";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #000;
            font-family: 'Share Tech Mono', monospace;
            padding: 2px 15px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 5px;
            color: var(--primary);
        }

        .form-group { margin-bottom: 25px; text-align: left; }

        label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 10px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 5px;
        }

        input:focus { outline: none; border-bottom-color: var(--primary); box-shadow: 0 5px 15px rgba(255, 31, 31, 0.1); }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .btn:hover { background: #fff; box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); }

        .alert {
            background: rgba(255, 31, 31, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>TERMINAL</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="form-group">
                <label>ENTER ACCESS KEY</label>
                <input type="password" name="password" required autofocus>
            </div>
            <button type="submit" class="btn">AUTHENTICATE</button>
        </form>
        
        <p style="margin-top: 30px; font-size: 0.7rem; color: #333; font-family: 'Share Tech Mono', monospace;">SECURE CHANNEL 09-X</p>
    </div>

</body>
</html>

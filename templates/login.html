<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StegoSecure AI - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root {
  --red: #ff0000;
  --dark-red: #8b0000;
  --deeper-red: #4a0000;
  --bg: #000000;
  --surface: rgba(12, 5, 5, 0.95);
  --border: rgba(255, 0, 0, 0.25);
  --border-hover: rgba(255, 0, 0, 0.7);
  --text: #e8e0e0;
  --muted: #7a6666;
  --glow: 0 0 20px rgba(255, 0, 0, 0.4);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  position: relative;
}

/* ── ANIMATED BACKGROUND ── */

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* Grid lines */
.bg-layer::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,0,0,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,0,0,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridpulse 6s ease-in-out infinite alternate;
}

@keyframes gridpulse {
  0%   { opacity: 0.4; }
  100% { opacity: 1; }
}

/* Radial glows */
.bg-layer::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(255,0,0,0.12), transparent),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(139,0,0,0.10), transparent),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(80,0,0,0.08), transparent);
  animation: glowshift 12s ease-in-out infinite alternate;
}

@keyframes glowshift {
  0%   { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.15) rotate(3deg); }
}

/* Scan line */
.scanline {
  position: fixed;
  top: -100%;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,0,0,0.6), transparent);
  animation: scan 8s linear infinite;
  z-index: 1;
  pointer-events: none;
}

@keyframes scan {
  0%   { top: -2px; opacity: 1; }
  100% { top: 100%; opacity: 0.3; }
}

/* Floating particles */
.particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--red);
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}

@keyframes float {
  0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-10px) translateX(30px); opacity: 0; }
}

/* ── LOGIN CARD ── */

.login-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 20px;
  animation: cardfadein 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes cardfadein {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 44px 40px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 0 1px rgba(255,0,0,0.05),
    0 20px 60px rgba(0,0,0,0.8),
    inset 0 1px 0 rgba(255,255,255,0.04);
  position: relative;
  overflow: hidden;
}

/* Top accent line */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 10%;
  width: 80%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  animation: topline 3s ease-in-out infinite;
}

@keyframes topline {
  0%, 100% { opacity: 0.4; width: 40%; left: 30%; }
  50%       { opacity: 1;   width: 80%; left: 10%; }
}

/* Corner brackets */
.card::after {
  content: "";
  position: absolute;
  top: 12px;
  right: 12px;
  width: 18px;
  height: 18px;
  border-top: 2px solid var(--red);
  border-right: 2px solid var(--red);
  opacity: 0.5;
}

.corner-bl {
  position: absolute;
  bottom: 12px;
  left: 12px;
  width: 18px;
  height: 18px;
  border-bottom: 2px solid var(--red);
  border-left: 2px solid var(--red);
  opacity: 0.5;
}

/* ── LOGO ── */

.logo-wrap {
  text-align: center;
  margin-bottom: 36px;
}

.logo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(255, 0, 0, 0.08);
  margin-bottom: 16px;
  position: relative;
  animation: iconpulse 2.5s ease-in-out infinite;
}

@keyframes iconpulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0.2); }
  50%       { box-shadow: 0 0 0 8px rgba(255,0,0,0); }
}

.logo-icon svg {
  width: 26px;
  height: 26px;
  fill: none;
  stroke: var(--red);
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.logo-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, #ff4444, #ff0000, #8b0000);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
  display: block;
}

.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 4px;
  display: block;
}

/* ── HEADING ── */

.heading {
  margin-bottom: 28px;
}

.heading h2 {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 1px;
}

.heading p {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* ── ERROR FLASH ── */

.flash-error {
  background: rgba(255, 0, 0, 0.08);
  border: 1px solid rgba(255, 0, 0, 0.35);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #ff6b6b;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  animation: shakein 0.4s ease;
}

@keyframes shakein {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-4px); }
  40%,80% { transform: translateX(4px); }
}

.flash-error::before {
  content: "⚠";
  font-size: 14px;
}

/* ── FORM ── */

.form-group {
  margin-bottom: 20px;
  position: relative;
}

label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
  transition: color 0.2s;
}

.form-group:focus-within label {
  color: var(--red);
}

.input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.input-icon {
  position: absolute;
  left: 14px;
  color: var(--muted);
  font-size: 15px;
  pointer-events: none;
  transition: color 0.2s;
  z-index: 2;
}

.form-group:focus-within .input-icon {
  color: var(--red);
}

input[type="text"],
input[type="password"] {
  width: 100%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 44px 13px 42px;
  color: var(--text);
  font-size: 15px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: all 0.25s;
  outline: none;
}

input[type="text"]:focus,
input[type="password"]:focus {
  border-color: var(--red);
  background: rgba(255, 0, 0, 0.04);
  box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.1), var(--glow);
}

input::placeholder {
  color: rgba(122, 102, 102, 0.6);
  font-size: 13px;
}

/* Eye toggle */
.eye-btn {
  position: absolute;
  right: 13px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
  padding: 4px;
  transition: color 0.2s;
  z-index: 2;
}

.eye-btn:hover { color: var(--red); }

/* ── SUBMIT BUTTON ── */

.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #cc0000, #8b0000);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 500;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}

.btn-login::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s;
}

.btn-login:hover::before { left: 100%; }

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255, 0, 0, 0.45);
  background: linear-gradient(135deg, #ff0000, #aa0000);
}

.btn-login:active {
  transform: translateY(0);
}

/* ── FOOTER LINKS ── */

.card-footer {
  margin-top: 24px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.card-footer a {
  color: #cc3333;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}

.card-footer a:hover {
  color: var(--red);
  text-shadow: 0 0 8px rgba(255,0,0,0.5);
}

/* ── STATUS BADGE ── */

.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 28px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1.5px;
}

.status-dot {
  width: 6px;
  height: 6px;
  background: #00ff88;
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
  box-shadow: 0 0 6px #00ff88;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer"></div>
<div class="scanline"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Login Card -->
<div class="login-wrap">
  <div class="card">
    <div class="corner-bl"></div>

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <span class="logo-title">STEGOSECURE</span>
      <span class="logo-sub">AI · STEGANOGRAPHY SYSTEM</span>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <span class="status-dot"></span>
      SECURE CONNECTION ESTABLISHED
    </div>

    <!-- Heading -->
    <div class="heading">
      <h2>Access Terminal</h2>
      <p>Authenticate to enter the secure vault</p>
    </div>

    <!-- Error flash (shown only when Flask passes error) -->
    {% if error %}
    <div class="flash-error">{{ error }}</div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('login') }}">

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
          <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePassword()">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">LOGIN</button>

    </form>

    <!-- Footer -->
    <div class="card-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </div>

  </div>
</div>

<script>
  // Password toggle
  function togglePassword() {
    const input = document.getElementById('password');
    const btn   = document.getElementById('eyeBtn');
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = '🙈';
    } else {
      input.type = 'password';
      btn.textContent = '👁';
    }
  }

  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    p.style.left     = Math.random() * 100 + '%';
    p.style.width    = (Math.random() * 2 + 1) + 'px';
    p.style.height   = p.style.width;
    p.style.animationDuration  = (Math.random() * 10 + 8) + 's';
    p.style.animationDelay     = (Math.random() * 10) + 's';
    p.style.opacity  = Math.random() * 0.5;
    container.appendChild(p);
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Register - StegoSecure</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 20%, rgba(255,0,0,0.2), transparent 40%),
              radial-gradient(circle at 70% 80%, rgba(255,0,0,0.1), transparent 40%);
  animation: movebg 10s infinite alternate;
  z-index: -1;
}

@keyframes movebg {
  0%   { transform: scale(1); }
  100% { transform: scale(1.2); }
}

.container {
  width: 400px;
  padding: 40px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  border: 1px solid rgba(255,0,0,0.4);
  backdrop-filter: blur(10px);
  text-align: center;
  box-shadow: 0 0 25px rgba(255,0,0,0.3);
}

.container h2 {
  color: red;
  margin-bottom: 25px;
  text-shadow: 0 0 10px red;
}

/* Flash messages */
.flash-messages {
  margin-bottom: 15px;
  text-align: left;
}

.flash {
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 14px;
  margin-bottom: 8px;
}

.flash.error {
  background: rgba(255, 0, 0, 0.15);
  border: 1px solid rgba(255, 0, 0, 0.5);
  color: #ff6b6b;
}

.flash.success {
  background: rgba(0, 200, 0, 0.1);
  border: 1px solid rgba(0, 200, 0, 0.4);
  color: #6bff6b;
}

.input-group {
  margin-bottom: 18px;
}

input {
  width: 100%;
  padding: 12px;
  background: #111;
  border: 1px solid #333;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: red;
  box-shadow: 0 0 8px red;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(45deg, #ff0000, #8b0000);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px red;
}

p {
  margin-top: 20px;
  color: #bbb;
}

a {
  color: red;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>
<div class="container">

  <h2>Create Account</h2>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <form method="POST" action="/register">

    <div class="input-group">
      <!-- ✅ name="name" matches backend's request.form['name'] -->
      <input type="text" name="name" placeholder="Full Name" required>
    </div>

    <div class="input-group">
      <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <input type="password" name="password" placeholder="Password" required>
    </div>

    <!-- ✅ Added confirm_password field the backend expects -->
    <div class="input-group">
      <input type="password" name="confirm_password" placeholder="Confirm Password" required>
    </div>

    <button type="submit">Register</button>

  </form>

  <p>Already have an account? <a href="/login">Login</a></p>

</div>
</body>
</html>
